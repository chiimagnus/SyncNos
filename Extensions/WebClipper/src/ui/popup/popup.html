<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SyncNos</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">SyncNos</div>
        <nav class="tabs" role="tablist" aria-label="Popup tabs">
          <button id="tabChats" class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="viewChats">
            Chats
          </button>
          <button id="tabSettings" class="tab" type="button" role="tab" aria-selected="false" aria-controls="viewSettings">
            Settings
          </button>
        </nav>
      </header>

      <section id="viewChats" class="view is-active" role="tabpanel" aria-labelledby="tabChats">
        <main class="chatsMain">
          <div id="list" class="list"></div>
        </main>

        <footer class="bottomDock" aria-label="Actions">
          <div class="statsRow">
            <div id="stats" class="stats">0 conversations</div>
          </div>

          <section class="toolbar is-docked" aria-label="Chat actions">
            <label class="checkbox">
              <input id="chkSelectAll" type="checkbox" />
              <span>Select all</span>
            </label>
            <div class="spacer"></div>
            <div class="exportWrap">
              <button id="btnExport" class="btn export" type="button" aria-haspopup="menu" aria-expanded="false">
                <span class="label">Export as Markdown</span>
                <span class="divider" aria-hidden="true"></span>
                <span class="caret" aria-hidden="true">▾</span>
              </button>
              <div id="exportMenu" class="menu" role="menu" aria-label="Export options" hidden>
                <button id="menuExportJson" class="menu-item" type="button" role="menuitem">Export as JSON</button>
                <button
                  id="menuMergeMarkdown"
                  class="menu-item"
                  type="button"
                  role="menuitemcheckbox"
                  aria-checked="false"
                  title="Merge selected conversations into one markdown file"
                >
                  Export as Merge Markdown
                </button>
              </div>
            </div>
            <button id="btnSyncNotion" class="btn">Sync</button>
          </section>
        </footer>
      </section>

      <section id="viewSettings" class="view" role="tabpanel" aria-labelledby="tabSettings">
        <section class="toolbar" id="notionBar">
          <div class="title" style="font-weight: 650;">Notion</div>
          <div id="notionStatus" class="sub" style="margin: 0 8px; max-width: 160px; text-align: right;"></div>
          <div class="spacer"></div>
          <button id="btnNotionConnect" class="btn">Connect</button>
        </section>

        <section class="toolbar" id="notionConfig">
          <input id="notionClientId" class="input" placeholder="Notion Client ID" />
          <input id="notionClientSecret" class="input" placeholder="Notion Client Secret" />
          <button id="btnNotionSaveConfig" class="btn">Save</button>
        </section>

        <section class="toolbar" id="notionParent">
          <input id="notionPageQuery" class="input" placeholder="Search parent page..." />
          <button id="btnNotionLoadPages" class="btn">Load</button>
        </section>

        <section class="toolbar" id="notionParentSelect">
          <select id="notionPages" class="input"></select>
          <button id="btnNotionSaveParent" class="btn">Use</button>
        </section>
      </section>
    </div>

    <script src="../../shared/runtime-client.js"></script>
    <script src="../../export/article-markdown.js"></script>
    <script src="../../export/zip-utils.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
