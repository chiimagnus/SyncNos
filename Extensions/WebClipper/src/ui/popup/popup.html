<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SyncNos</title>
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/flash-ok.css" />
    <link rel="stylesheet" href="../styles/popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">
          <img class="appLogo" src="../../../icons/icon-48.png" alt="" />
          <span>SyncNos</span>
        </div>
        <nav class="tabs" role="tablist" aria-label="Popup tabs">
          <span class="tabIndicator" aria-hidden="true"></span>
          <button id="tabChats" class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="viewChats">
            Chats
          </button>
          <button id="tabSettings" class="tab" type="button" role="tab" aria-selected="false" aria-controls="viewSettings">
            Settings
          </button>
          <button id="tabAbout" class="tab" type="button" role="tab" aria-selected="false" aria-controls="viewAbout">
            About
          </button>
        </nav>
      </header>

      <section id="viewChats" class="view is-active" role="tabpanel" aria-labelledby="tabChats">
        <main class="chatsMain">
          <div id="list" class="list"></div>
        </main>

        <footer class="bottomDock" aria-label="Actions">
          <section class="bottomBar" aria-label="Chat actions">
            <div id="stats" class="stats">0 conversations</div>
            <div class="spacer"></div>
            <label class="checkbox compact">
              <input id="chkSelectAll" type="checkbox" aria-label="Select all" />
              <span class="srOnly">Select all</span>
            </label>
            <div class="exportWrap">
              <button id="btnExport" class="btn export" type="button" aria-haspopup="menu" aria-expanded="false">
                <span class="label">Export</span>
                <span class="caret" aria-hidden="true">▾</span>
              </button>
              <div id="exportMenu" class="menu" role="menu" aria-label="Export options" hidden>
                <button id="menuExportSingleMarkdown" class="menu-item" type="button" role="menuitem">Single Markdown</button>
                <button id="menuExportMultiMarkdown" class="menu-item" type="button" role="menuitem">Multi Markdown</button>
                <button id="menuExportJsons" class="menu-item" type="button" role="menuitem">JSONs</button>
              </div>
            </div>
            <button id="btnSyncNotion" class="btn">Sync</button>
          </section>
        </footer>
      </section>

      <section id="viewSettings" class="view" role="tabpanel" aria-labelledby="tabSettings">
        <section class="toolbar settingsPanel" id="notionAuthCard" aria-label="Notion settings">
          <div class="settingsSectionHeader">
            <div class="settingsSectionTitle">Notion</div>
            <div class="settingsSectionSub">Connect via OAuth.</div>
          </div>

          <div class="settingsRow" id="notionBar">
            <div class="authStatus">
              <div class="authHeadline">
                <span id="notionAuthDot" class="authDot" aria-hidden="true"></span>
                <span id="notionStatusTitle">Not connected</span>
              </div>
              <div id="notionStatus" class="authSub"></div>
            </div>
            <div class="spacer"></div>
            <button id="btnNotionConnect" class="btn primary">Connect</button>
          </div>

          <div class="settingsDivider" role="presentation"></div>

          <div class="settingsSectionHeader">
            <div class="settingsSectionTitle">Parent Page</div>
            <div class="settingsSectionSub">Where databases are created.</div>
          </div>

          <div class="settingsForm" aria-label="Parent page selector">
            <div class="settingsField">
              <div class="settingsLabel">Page</div>
              <div class="settingsControl">
                <select id="notionPages" class="input"></select>
                <button id="btnNotionLoadPages" class="btn icon" type="button" title="Refresh">↻</button>
              </div>
            </div>
          </div>
        </section>
      </section>

      <section id="viewAbout" class="view" role="tabpanel" aria-labelledby="tabAbout">
        <section class="toolbar aboutHero" aria-label="About SyncNos WebClipper">
          <img class="aboutLogo" src="../../../icons/icon-48.png" alt="" />
          <div class="aboutInfo">
            <div class="aboutName">SyncNos WebClipper</div>
            <div class="sub" id="aboutVersion">Version</div>
          </div>
          <div class="aboutLinks" aria-label="Links">
            <button id="btnAboutMacApp" class="btn" type="button">Mac App</button>
            <button id="btnAboutSource" class="btn" type="button">Source Code</button>
            <button id="btnAboutChangelog" class="btn" type="button">Changelog</button>
          </div>
        </section>

        <section class="toolbar" aria-label="Author">
          <img class="aboutAvatar" src="../../../icons/author-avatar.png" alt="Chii Magnus avatar" />
          <div class="aboutAuthor">
            <div class="aboutAuthorName">𝓒𝓱𝓲𝓲 𝓜𝓪𝓰𝓷𝓾𝓼</div>
            <div class="sub">Time Machine Creator~</div>
          </div>
          <div class="spacer"></div>
          <button id="btnAboutMail" class="btn" type="button">Mail</button>
          <button id="btnAboutGitHub" class="btn" type="button">GitHub</button>
        </section>
      </section>
    </div>

    <script src="../../shared/runtime-client.js"></script>
    <script src="../../export/article-markdown.js"></script>
    <script src="../../export/zip-utils.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
