name: WebClipper Pre-release Assets

on:
  push:
    tags:
      - 'v*-alpha*'
      - 'v*-beta*'
      - 'v*-rc*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Pre-release tag to attach assets to (e.g. v1.5.5-beta1). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  webclipper_prerelease_assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve tag name
        id: tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webclipper/package-lock.json

      - name: Install WebClipper deps
        run: npm ci --prefix webclipper

      - name: WebClipper gate (lint/format/compile/test)
        run: npm run --prefix webclipper gate:ci

      - name: Build WebClipper Chrome zip
        run: |
          set -euo pipefail
          node .github/scripts/webclipper/package-release-assets.mjs \
            --target=chrome \
            --zip \
            --zip-name="syncnos-webclipper-chrome-${{ steps.tag.outputs.name }}.zip"

      - name: Build WebClipper Edge zip
        run: |
          set -euo pipefail
          node .github/scripts/webclipper/package-release-assets.mjs \
            --target=edge \
            --out=dist-edge \
            --zip \
            --zip-name="syncnos-webclipper-edge-${{ steps.tag.outputs.name }}.zip"

      - name: Build WebClipper Firefox XPI
        run: |
          set -euo pipefail
          node .github/scripts/webclipper/package-release-assets.mjs \
            --target=firefox \
            --zip \
            --zip-name="syncnos-webclipper-firefox-${{ steps.tag.outputs.name }}.xpi"

      - name: Prepare release artifacts
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp "webclipper/syncnos-webclipper-chrome-${{ steps.tag.outputs.name }}.zip" "release-artifacts/syncnos-webclipper-chrome-${{ steps.tag.outputs.name }}.zip"
          cp "webclipper/syncnos-webclipper-edge-${{ steps.tag.outputs.name }}.zip" "release-artifacts/syncnos-webclipper-edge-${{ steps.tag.outputs.name }}.zip"
          cp "webclipper/syncnos-webclipper-firefox-${{ steps.tag.outputs.name }}.xpi" "release-artifacts/syncnos-webclipper-firefox-${{ steps.tag.outputs.name }}.xpi"

      - name: Upload assets to GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: true
          generate_release_notes: false
          body: ''
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

