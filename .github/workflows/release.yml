name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            **Links**
            - Website: https://chiimagnus.notion.io/syncnos
            - macOS App: https://apps.apple.com/app/syncnos/id6755133888
            - Chrome Extension: https://chromewebstore.google.com/detail/syncnos-webclipper/hmgjflllphdffeocddjjcfllifhejpok
            - Firefox Extension: https://addons.mozilla.org/firefox/addon/syncnos-webclipper/
          generate_release_notes: true
          append_body: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
