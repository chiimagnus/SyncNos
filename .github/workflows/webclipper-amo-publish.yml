name: WebClipper Publish to AMO (Firefox)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.14.5). Required for manual runs."
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish_amo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve tag name
        id: tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webclipper/package-lock.json

      - name: Install WebClipper deps
        run: npm ci --prefix webclipper

      - name: Verify manifest version matches tag
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const path = "webclipper/wxt.config.ts";
          const tagName = process.env.TAG_NAME;
          const tagVersion = String(tagName || "").replace(/^v/, "");
          const source = fs.readFileSync(path, "utf8");
          const m = source.match(/version:\s*['"]([^'"]+)['"]/);
          if (!m || !m[1]) throw new Error("wxt.config.ts missing manifest.version");
          const manifestVersion = String(m[1]).trim();
          if (manifestVersion !== tagVersion) {
            throw new Error(`manifest version mismatch: wxt=${manifestVersion} tag=${tagVersion}`);
          }
          console.log(`[ok] manifest version: ${manifestVersion}`);
          NODE
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}

      - name: Build Firefox XPI
        run: |
          set -euo pipefail
          node .github/scripts/webclipper/package-release-assets.mjs \
            --target=firefox \
            --zip \
            --zip-name="SyncNos-WebClipper-firefox.xpi"

      - name: Build AMO source zip
        run: node .github/scripts/webclipper/package-amo-source.mjs

      - name: Submit to AMO (Listed)
        run: node .github/scripts/webclipper/publish-amo.mjs
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          AMO_ADDON_ID: ${{ secrets.AMO_ADDON_ID }}
          AMO_CHANNEL: listed
          AMO_ADDON_SUMMARY: ${{ vars.AMO_ADDON_SUMMARY }}
          AMO_ADDON_SUMMARY_LOCALE: ${{ vars.AMO_ADDON_SUMMARY_LOCALE }}
          AMO_XPI_PATH: webclipper/SyncNos-WebClipper-firefox.xpi
          AMO_SOURCE_ZIP_PATH: webclipper/SyncNos-WebClipper-amo-source.zip
