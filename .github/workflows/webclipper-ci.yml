name: WebClipper CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - webclipper/**
      - .github/scripts/webclipper/**
      - .github/workflows/webclipper-ci.yml

concurrency:
  group: webclipper-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate-ci:
    name: gate:ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !github.event.pull_request.draft }}

    defaults:
      run:
        working-directory: webclipper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webclipper/package-lock.json

      - name: Install
        run: npm ci

      - name: gate:ci
        run: npm run gate:ci
