name: WebClipper Publish to Chrome Web Store

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.14.5). Required for manual runs."
        required: true
        type: string
      publish:
        description: "Whether to publish after upload (true/false)."
        required: false
        type: boolean
        default: true
      publish_target:
        description: "Publish target: default (public) or trustedTesters."
        required: false
        type: choice
        default: default
        options:
          - default
          - trustedTesters

permissions:
  contents: read

jobs:
  publish_cws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve tag name
        id: tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve publish options
        id: publish
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            publish="$(jq -r '.inputs.publish // "true"' "$GITHUB_EVENT_PATH")"
            target="$(jq -r '.inputs.publish_target // "default"' "$GITHUB_EVENT_PATH")"
          else
            publish="true"
            target="default"
          fi
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "target=${target}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webclipper/package-lock.json

      - name: Install WebClipper deps
        run: npm ci --prefix webclipper

      - name: Verify manifest version matches tag
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const path = "webclipper/wxt.config.ts";
          const tagName = process.env.TAG_NAME;
          const tagVersion = String(tagName || "").replace(/^v/, "");
          const source = fs.readFileSync(path, "utf8");
          const m = source.match(/version:\s*['"]([^'"]+)['"]/);
          if (!m || !m[1]) throw new Error("wxt.config.ts missing manifest.version");
          const manifestVersion = String(m[1]).trim();
          if (manifestVersion !== tagVersion) {
            throw new Error(`manifest version mismatch: wxt=${manifestVersion} tag=${tagVersion}`);
          }
          console.log(`[ok] manifest version: ${manifestVersion}`);
          NODE
        env:
          TAG_NAME: ${{ steps.tag.outputs.name }}

      - name: Build Chrome zip
        run: |
          set -euo pipefail
          node .github/scripts/webclipper/package-release-assets.mjs \
            --target=chrome \
            --zip \
            --zip-name="SyncNos-WebClipper-chrome-${{ steps.tag.outputs.name }}.zip"

      # Required secrets:
      # - CWS_EXTENSION_ID
      # - CWS_CLIENT_ID
      # - CWS_CLIENT_SECRET
      # - CWS_REFRESH_TOKEN
      - name: Upload/Publish to Chrome Web Store
        run: node .github/scripts/webclipper/publish-cws.mjs
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_ZIP_PATH: webclipper/SyncNos-WebClipper-chrome-${{ steps.tag.outputs.name }}.zip
          CWS_PUBLISH: ${{ steps.publish.outputs.publish }}
          CWS_PUBLISH_TARGET: ${{ steps.publish.outputs.target }}
