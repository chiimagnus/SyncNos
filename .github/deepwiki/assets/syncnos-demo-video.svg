<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SyncNos demo video">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.18">
    <circle cx="1060" cy="110" r="190" fill="#60a5fa"/>
    <circle cx="990" cy="190" r="120" fill="#a78bfa"/>
    <circle cx="160" cy="520" r="210" fill="#34d399"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="120" width="980" height="390" rx="28" fill="url(#card)" stroke="#1f2937" stroke-width="2"/>
  </g>

  <g transform="translate(190 190)">
    <rect x="0" y="0" width="260" height="260" rx="26" fill="#0b1220" stroke="#1f2937" stroke-width="2"/>
    <circle cx="130" cy="130" r="86" fill="#111827" stroke="#334155" stroke-width="2"/>
    <path d="M118 96 L118 164 L172 130 Z" fill="#e5e7eb"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,Apple Color Emoji,Segoe UI Emoji" fill="#e5e7eb">
    <text x="500" y="230" font-size="44" font-weight="700">SyncNos Demo Video</text>
    <text x="500" y="280" font-size="28" opacity="0.92">操作演示视频</text>
    <text x="500" y="350" font-size="22" opacity="0.78">Click to watch on Bilibili</text>
    <text x="500" y="392" font-size="20" opacity="0.72">BV1gjwQznEx7</text>
  </g>

  <g opacity="0.8">
    <rect x="500" y="430" width="250" height="52" rx="26" fill="#2563eb"/>
    <text x="625" y="465" font-size="20" font-weight="700" text-anchor="middle" fill="#ffffff"
      font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial">Watch Video</text>
  </g>
</svg>
